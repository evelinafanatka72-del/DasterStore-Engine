name: build
on: [push, pull_request]
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          mkdir -p ~/.local/bin
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          mv Godot_v4.3-stable_linux.x86_64 ~/.local/bin/godot
          chmod +x ~/.local/bin/godot
          
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip -q Godot_v4.3-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.3.stable
          mv ~/.local/share/godot/export_templates/4.3.stable/templates/* ~/.local/share/godot/export_templates/4.3.stable/

      - name: Force Create Export Preset
        run: |
          mkdir -p builds/windows
          # Мы полностью перезаписываем файл настроек, чтобы исключить любые ошибки
          cat <<EOF > export_presets.cfg
          [preset.0]
          name="Windows Desktop"
          platform="Windows Desktop"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="builds/windows/DasterStore.exe"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          debug/export_console_wrapper=1
          binary_format/embed_pck=false
          texture_format/bptc=true
          texture_format/s3tc=true
          texture_format/etc2=false
          application/modify_resources=false
          application/icon=""
          application/console_wrapper_icon=""
          application/file_version=""
          application/product_version=""
          application/company_name=""
          application/product_name=""
          application/file_description=""
          application/copyright=""
          application/trademarks=""
          ssh_remote_deploy/enabled=false
          EOF

      - name: Import & Export
        run: |
          # Сначала импорт, потом экспорт
          ~/.local/bin/godot --headless --path . -e --quit --import || true
          ~/.local/bin/godot --headless --path . --export-release "Windows Desktop" builds/windows/DasterStore.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DasterStore-Windows-Build
          path: builds/windows/
