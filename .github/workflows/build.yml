name: build
on: [push, pull_request]
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          mkdir -p ~/.local/bin
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip Godot_v4.3-stable_linux.x86_64.zip
          mv Godot_v4.3-stable_linux.x86_64 ~/.local/bin/godot
          chmod +x ~/.local/bin/godot
          
          wget https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip Godot_v4.3-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.3.stable
          mv ~/.local/share/godot/export_templates/4.3.stable/templates/* ~/.local/share/godot/export_templates/4.3.stable/

      - name: Prepare project
        run: |
          mkdir -p .godot/editor
          mkdir -p builds/windows
          chmod -R 777 .

      - name: Windows Export
        run: |
          ~/.local/bin/godot --headless --path . --export-release "Windows Desktop" builds/windows/DasterStore.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DasterStore-Windows
          path: builds/windows/
